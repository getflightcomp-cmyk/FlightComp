  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Check your EU261/UK261 flight compensation rights in 60 seconds." />
  <title>FlightClaim — EU261 Compensation Checker</title>

  <style>
/* ── Reset ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0F1C;--surf:#111827;--surf2:#1A2235;--surf3:#1F2937;
  --border:rgba(255,255,255,.08);--border-h:rgba(255,255,255,.15);
  --border-focus:rgba(59,130,246,.6);
  --text:#F9FAFB;--muted:#9CA3AF;--dim:#6B7280;
  --blue:#3B82F6;--bluedark:#2563EB;--blueglow:rgba(59,130,246,.15);
  --green:#22C55E;--greenbg:rgba(34,197,94,.10);--greenbd:rgba(34,197,94,.35);
  --amber:#F59E0B;--amberbg:rgba(245,158,11,.10);--amberbd:rgba(245,158,11,.35);
  --red:#EF4444;--redbg:rgba(239,68,68,.10);--redbd:rgba(239,68,68,.35);
  --rc:14px;--rbadge:20px;--rbtn:12px;
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
button{font-family:inherit}
input{font-family:inherit}

/* ── Screen container ── */
#app{display:flex;flex-direction:column;min-height:100dvh}
.screen{
  min-height:100dvh;display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;
  padding:0 20px env(safe-area-inset-bottom,24px);
  animation:slideUp .28s cubic-bezier(.4,0,.2,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ── Progress bar ── */
.prog-wrap{padding:16px 0 8px;flex-shrink:0}
.prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-back{
  display:flex;align-items:center;gap:6px;
  background:none;border:none;color:var(--muted);
  font-size:14px;font-weight:500;cursor:pointer;
  padding:8px 0;min-height:44px;transition:color .15s;
}
.prog-back:hover{color:var(--text)}
.prog-step{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);letter-spacing:.5px}
.prog-track{width:100%;height:3px;background:var(--surf3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1)}

/* ── Q screens ── */
.q-body{flex:1;display:flex;flex-direction:column;padding:28px 0 24px}
.q-label{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin-bottom:12px}
.q-head{font-size:26px;font-weight:800;line-height:1.15;letter-spacing:-.4px;color:var(--text);margin-bottom:28px}
.q-helper{font-size:13px;color:var(--dim);line-height:1.6;margin-top:16px}
.q-helper strong{color:var(--text)}

/* ── Option cards ── */
.opts{display:flex;flex-direction:column;gap:10px;flex:1}
.opt{
  display:flex;align-items:center;gap:14px;
  padding:18px 16px;background:var(--surf);
  border:1.5px solid var(--border);border-radius:var(--rc);
  cursor:pointer;transition:border-color .15s,background .15s,transform .1s;
  min-height:64px;-webkit-tap-highlight-color:transparent;
  user-select:none;text-align:left;width:100%;
}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:var(--blue);background:var(--blueglow)}
.opt:hover:not(.sel){border-color:var(--border-h)}
.opt-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center}
.opt-txt{flex:1}
.opt-title{font-size:16px;font-weight:600;color:var(--text);line-height:1.2;display:block}
.opt-sub{font-size:12px;color:var(--muted);margin-top:2px;display:block}
.opt-check{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--border-h);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:13px;transition:all .15s;
}
.opt.sel .opt-check{background:var(--blue);border-color:var(--blue);color:white}

/* ── Inputs ── */
.inp{
  width:100%;height:58px;padding:0 16px;
  background:var(--surf);border:1.5px solid var(--border);
  border-radius:var(--rc);font-size:20px;font-weight:600;
  color:var(--text);outline:none;
  transition:border-color .15s,box-shadow .15s;
  caret-color:var(--blue);
}
.inp::placeholder{color:var(--dim);font-weight:400}
.inp:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.inp-mono{font-family:'DM Mono',monospace;font-size:22px;letter-spacing:1px;text-transform:uppercase}
.inp-date{font-size:16px;color-scheme:dark}

.route-row{display:flex;flex-direction:column;gap:12px}
.route-wrap{position:relative}
.route-lbl{
  position:absolute;left:14px;top:10px;
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:1px;text-transform:uppercase;color:var(--blue);z-index:1;
}
.route-inp{
  width:100%;height:70px;padding:28px 16px 10px;
  background:var(--surf);border:1.5px solid var(--border);
  border-radius:var(--rc);font-size:18px;font-weight:600;
  color:var(--text);outline:none;
  transition:border-color .15s,box-shadow .15s;
  caret-color:var(--blue);
}
.route-inp::placeholder{color:var(--dim);font-weight:400;font-size:15px}
.route-inp:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.route-arrow{text-align:center;color:var(--dim);font-size:18px;margin:-4px 0}

/* ── Buttons ── */
.btn-cont{
  width:100%;height:54px;background:var(--blue);color:white;
  border:none;border-radius:var(--rbtn);
  font-size:16px;font-weight:700;cursor:pointer;
  margin-top:auto;padding-top:0;
  transition:opacity .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;letter-spacing:-.2px;
}
.btn-cont:active{opacity:.88;transform:scale(.98)}
.btn-cont:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ── Hook ── */
.hook{
  min-height:100dvh;display:flex;flex-direction:column;
  justify-content:center;max-width:480px;margin:0 auto;
  padding:40px 24px env(safe-area-inset-bottom,32px);
  animation:slideUp .28s cubic-bezier(.4,0,.2,1) both;
}
.hook-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--blueglow);border:1px solid rgba(59,130,246,.25);
  border-radius:var(--rbadge);padding:6px 14px;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  color:var(--blue);letter-spacing:.3px;margin-bottom:28px;
}
.hook-h1{font-size:clamp(32px,8vw,42px);font-weight:800;line-height:1.1;letter-spacing:-1px;color:var(--text);margin-bottom:16px}
.hook-h1 .hi{font-style:normal;color:var(--green)}
.hook-sub{font-size:17px;color:var(--muted);line-height:1.55;margin-bottom:32px;font-weight:400}
.hook-ctx{
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--rc);padding:16px;margin-bottom:32px;
  display:flex;gap:12px;align-items:flex-start;
}
.hook-ctx-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.hook-ctx-txt{font-size:13px;color:var(--muted);line-height:1.6}
.hook-ctx-txt strong{color:var(--text);font-weight:600}
.btn-hook{
  width:100%;height:58px;background:var(--blue);color:white;
  border:none;border-radius:var(--rbtn);
  font-size:18px;font-weight:700;cursor:pointer;letter-spacing:-.3px;
  transition:opacity .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 24px rgba(59,130,246,.35);
}
.btn-hook:active{opacity:.88;transform:scale(.99)}
.hook-trust{display:flex;justify-content:center;gap:20px;margin-top:20px}
.trust-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--dim)}

/* ── Results ── */
.res{
  min-height:100dvh;display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;padding:0 20px 40px;
  animation:slideUp .28s cubic-bezier(.4,0,.2,1) both;
}

/* Verdict banner */
.vbanner{margin:0 -20px;padding:32px 24px 28px;text-align:center;position:relative}
.vbanner.likely {background:linear-gradient(160deg,#0D1F16 0%,#0A1812 100%);border-bottom:1px solid var(--greenbd)}
.vbanner.possibly{background:linear-gradient(160deg,#1C160A 0%,#160F05 100%);border-bottom:1px solid var(--amberbd)}
.vbanner.unlikely{background:linear-gradient(160deg,#1A0A0A 0%,#130808 100%);border-bottom:1px solid var(--redbd)}

.veyebrow{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.likely  .veyebrow{color:var(--green)}
.possibly .veyebrow{color:var(--amber)}
.unlikely .veyebrow{color:var(--red)}

.vbadge{
  display:inline-flex;align-items:center;gap:7px;
  border-radius:var(--rbadge);padding:7px 18px;
  font-size:13px;font-weight:700;letter-spacing:.3px;margin-bottom:20px;
}
.likely  .vbadge{background:var(--greenbg);border:1px solid var(--greenbd);color:var(--green)}
.possibly .vbadge{background:var(--amberbg);border:1px solid var(--amberbd);color:var(--amber)}
.unlikely .vbadge{background:var(--redbg);  border:1px solid var(--redbd);  color:var(--red)}

.vamount{font-size:68px;font-weight:900;letter-spacing:-3px;line-height:1;margin-bottom:8px}
.likely  .vamount{color:var(--green)}
.possibly .vamount{color:var(--amber)}
.unlikely .vamount{color:var(--red)}

.vreg{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase}
.vnote{font-size:13px;color:var(--muted);margin-top:10px;line-height:1.5;max-width:320px;margin-left:auto;margin-right:auto}

/* Results body */
.res-body{flex:1;padding-top:20px;display:flex;flex-direction:column;gap:14px}

/* Primary CTA */
.cta-pri{
  background:var(--surf);border:1px solid rgba(59,130,246,.2);
  border-radius:var(--rc);padding:20px;
  box-shadow:0 2px 16px rgba(59,130,246,.08);
}
.cta-pri-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cta-title{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.cta-price{
  font-family:'DM Mono',monospace;font-size:15px;font-weight:500;
  color:var(--blue);background:var(--blueglow);
  border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:3px 10px;
}
.cta-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.btn-claim{
  width:100%;height:52px;background:var(--blue);color:white;
  border:none;border-radius:var(--rbtn);
  font-size:16px;font-weight:700;cursor:pointer;letter-spacing:-.2px;
  transition:opacity .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 2px 12px rgba(59,130,246,.3);
}
.btn-claim:active{opacity:.88;transform:scale(.98)}

/* Secondary CTA */
.cta-sec{
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--rc);padding:16px 18px;
  display:flex;align-items:center;gap:14px;
}
.cta-sec-ico{font-size:24px;flex-shrink:0}
.cta-sec-txt{flex:1}
.cta-sec-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.cta-sec-sub{font-size:12px;color:var(--dim);line-height:1.5}
.cta-sec-badge{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  color:var(--dim);background:var(--surf3);border-radius:6px;padding:2px 8px;flex-shrink:0;
}

/* Expandable */
.expander{background:var(--surf);border:1px solid var(--border);border-radius:var(--rc);overflow:hidden}
.exp-trigger{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;background:none;border:none;cursor:pointer;text-align:left;
  -webkit-tap-highlight-color:transparent;transition:background .15s;min-height:56px;
}
.exp-trigger:hover{background:rgba(255,255,255,.02)}
.exp-left{display:flex;align-items:center;gap:10px}
.exp-ico{font-size:16px}
.exp-lbl{font-size:14px;font-weight:600;color:var(--text)}
.exp-chev{color:var(--dim);font-size:12px;transition:transform .2s;flex-shrink:0;line-height:1}
.exp-chev.open{transform:rotate(180deg)}
.exp-body{padding:0 18px 18px;border-top:1px solid var(--border);display:none}
.exp-body.open{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

.desk-script{
  background:var(--bg);border-radius:10px;padding:14px 56px 14px 14px;
  margin-top:14px;font-size:14px;line-height:1.7;
  color:var(--muted);font-style:italic;
  border-left:3px solid var(--blue);position:relative;
}
.copy-btn{
  position:absolute;top:8px;right:8px;
  background:var(--blueglow);border:1px solid rgba(59,130,246,.2);
  border-radius:7px;padding:4px 10px;
  font-size:11px;font-weight:600;color:var(--blue);cursor:pointer;
  transition:opacity .15s;
}
.copy-btn:active{opacity:.7}

.care-list{display:flex;flex-direction:column;margin-top:14px}
.care-item{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border)}
.care-item:last-child{border-bottom:none;padding-bottom:0}
.care-item:first-child{padding-top:0}
.care-em{font-size:16px;flex-shrink:0;margin-top:1px}
.care-txt{font-size:14px;color:var(--muted);line-height:1.5}
.care-txt strong{color:var(--text);font-weight:600}

/* Summary grid */
.summary{
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--rc);padding:14px 16px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.sum-cell{}
.sum-key{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.sum-val{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;word-break:break-word}

.reset-link{text-align:center;margin-top:8px}
.reset-link button{
  background:none;border:none;color:var(--dim);
  font-size:14px;cursor:pointer;padding:8px;
  transition:color .15s;text-decoration:underline;text-underline-offset:3px;
}
.reset-link button:hover{color:var(--muted)}
  </style>
</head>

function resolveLoc(txt){
  if(!txt)return null;
  const up=txt.trim().toUpperCase().replace(/\s/g,'');
  if(/^[A-Z]{3}$/.test(up)&&AIRPORTS[up])return AIRPORTS[up];
  const lo=txt.toLowerCase().trim();
  if(CITY_MAP[lo]&&AIRPORTS[CITY_MAP[lo]])return AIRPORTS[CITY_MAP[lo]];
  for(const[k,v]of Object.entries(CITY_MAP)){
    if(k.includes(lo)||lo.includes(k)){
      if(AIRPORTS[Array.isArray(v)?v[0]:v])return AIRPORTS[Array.isArray(v)?v[0]:v];
    }
  }
  return null;
}

function haversine([a,b],[c,d]){
  const R=6371,r=Math.PI/180,dlat=(c-a)*r,dlon=(d-b)*r;
  const s=Math.sin(dlat/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dlon/2)**2;
  return Math.round(2*R*Math.atan2(Math.sqrt(s),Math.sqrt(1-s)));
}

function delayHrs(v){return{under2:1,'2to3':2.5,'3to4':3.5,'4plus':5}[v]||0}

function getCare(km,delay,isCancel,covered){
  if(!covered)return[];
  const eff=isCancel?99:delayHrs(delay);
  const thr=km&&km<=1500?2:3;
  const r=[];
  if(eff>=thr||isCancel){
    r.push({e:'🍽️',t:'Meals & refreshments',d:'Proportional to your waiting time. Ask for vouchers at the airport desk right now.'});
    r.push({e:'📞',t:'Two free communications',d:'Phone calls, emails, or faxes to inform family or colleagues.'});
  }
  if(eff>=6||isCancel){
    r.push({e:'🏨',t:'Hotel accommodation',d:'If an overnight stay is required, the airline must arrange and pay for it.'});
    r.push({e:'🚌',t:'Airport–hotel transport',d:'Return transfers between the hotel and airport at no cost to you.'});
  }
  if(eff>=5||isCancel){
    r.push({e:'↩️',t:'Full refund OR rebooking',d:'Choose a full refund of your ticket, or rebooking on the next available flight at no extra charge.'});
  }
  return r;
}

function getScript(verdict,reg,comp,reason){
  const law=reg==='UK261'?'UK261/2004':'EU 261/2004';
  const amt=comp?comp.amount:'the applicable statutory amount';
  if(reason==='weather')
    return `"I understand you are citing extraordinary circumstances and that financial compensation may not be payable. However, under Article 9 of Regulation ${law} I am still entitled to care and assistance. Please provide meal vouchers immediately and confirm my rebooking options in writing. I require a written statement of the disruption reason for my own records."`;
  if(verdict==='unlikely')
    return `"Could you please confirm the reason for this disruption in writing, along with a customer reference number? I want to ensure I have documentation in case the delay worsens. I am aware of my rights under Regulation ${law}."`;
  if(verdict==='possibly')
    return `"I am invoking my rights under Regulation ${law}. I believe I am entitled to statutory compensation of ${amt} per passenger. Please confirm your position in writing with a customer service reference number. I will escalate to the national enforcement body if this is not resolved today."`;
  return `"I am formally invoking my rights under Regulation ${law}. This flight qualifies for statutory compensation of ${amt} per passenger. I require written acknowledgement of this claim, the reason for the disruption, and a customer reference number before I leave this desk. If you cannot authorise this now, please provide your written complaints procedure — I will be filing with the national enforcement body."`;
}

function assessClaim(state){
  const {disruption,flightNumber,flightDate,from,to,delayLength,reason}=state;
  const dep=resolveLoc(from), arr=resolveLoc(to);
  const depCov=dep?['EU','EEA','UK'].includes(dep.region):null;
  const reg=dep&&dep.region==='UK'?'UK261':'EU261';
  const km=dep&&arr?haversine(dep.c,arr.c):null;

  const tiers=reg==='UK261'
    ?{short:'£220',medium:'£350',long:'£520'}
    :{short:'€250',medium:'€400',long:'€600'};
  const comp=km==null?null
    :km<=1500?{amount:tiers.short,tier:'short',km}
    :km<=3500?{amount:tiers.medium,tier:'medium',km}
    :{amount:tiers.long,tier:'long',km};

  const isCancel=disruption==='cancelled';
  const isDenied=disruption==='denied';
  const isDown=disruption==='downgraded';
  const isDelayed=disruption==='delayed';
  const isXtra=reason==='weather';
  const hrs=delayHrs(delayLength);
  const triggered=isCancel||isDenied||isDown||(isDelayed&&hrs>=3);

  // Validity
  let expired=false,yearsAgo=null,limit=3;
  if(flightDate){
    yearsAgo=(Date.now()-new Date(flightDate).getTime())/(1000*60*60*24*365.25);
    limit=reg==='UK261'?6:3;
    expired=yearsAgo>limit;
  }

  let verdict,verdictNote='';
  if(expired){
    verdict='unlikely';
    verdictNote=`Your flight was ${Math.floor(yearsAgo)} years ago. Claims under ${reg} must be filed within ${limit} years.`;
  } else if(depCov===false){
    verdict='unlikely';
    verdictNote=`EU261/UK261 applies to flights departing from EU/EEA/UK airports${dep?` — ${dep.city} (${dep.country}) is not covered`:''}. If your airline is EU/UK-registered you may have a case regardless.`;
  } else if(!triggered){
    verdict='unlikely';
    if(isDelayed&&hrs<3) verdictNote=`EU261 compensation requires a 3+ hour arrival delay. A ${hrs<2?'sub-2':'2–3'} hour delay doesn't meet this threshold.`;
  } else if(isXtra){
    verdict='unlikely';
    verdictNote='Extraordinary circumstances (weather, ATC strikes, security incidents) exempt airlines from cash compensation. Your care rights — meals, hotel, rebooking — are unaffected.';
  } else if(depCov===null){
    verdict='possibly';
    verdictNote=`We couldn't confirm your departure airport. If it's in the EU/EEA/UK, or if your airline is EU/UK-registered, you may be covered.`;
  } else {
    verdict='likely';
  }

  const care=getCare(km,delayLength,isCancel,depCov!==false);
  const script=getScript(verdict,reg,comp,reason);

  return{verdict,reg,comp,km,care,script,verdictNote,
    dep,arr,disruption,reason,flightNumber,flightDate,from,to,delayLength};
}

function render(){
  const app=document.getElementById('app');
  const s=state.screen;
  let html='';

  if(s==='hook')         html=hookHTML();
  else if(s==='q1')      html=q1HTML();
  else if(s==='q2')      html=q2HTML();
  else if(s==='q3')      html=q3HTML();
  else if(s==='q4')      html=q4HTML();
  else if(s==='q5')      html=q5HTML();
  else if(s==='q6')      html=q6HTML();
  else if(s==='results'){ const r=assessClaim(state); html=resultsHTML(r); }

  app.innerHTML=html;
  window.scrollTo({top:0});
  attachEvents(s);
}

  console.info('[Session 2] handleClaimLetter called — Stripe integration goes here');
  alert('Claim letter & Stripe integration coming in Session 2.');
}

function attachEvents(s){
  // Back
  document.getElementById('btn-back')?.addEventListener('click',goBack);

  if(s==='hook'){
    document.getElementById('btn-start').addEventListener('click',goNext);
  }

  // Auto-advance option screens
  if(s==='q1'||s==='q5'||s==='q6'){
    document.querySelectorAll('[data-q]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const key=btn.dataset.q, val=btn.dataset.opt;
        state[key]=val;
        // brief highlight then advance
        btn.classList.add('sel');
        setTimeout(()=>{
          if(s==='q6'){state.screen='results';render();}
          else goNext();
        },220);
      });
    });
  }

  // Q2 — flight number
  if(s==='q2'){
    const inp=document.getElementById('inp-fn');
    const cont=document.getElementById('btn-cont2');
    inp.focus();
    inp.addEventListener('input',()=>{
      state.flightNumber=inp.value.toUpperCase().replace(/\s/g,'');
      cont.disabled=!state.flightNumber.trim();
    });
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&state.flightNumber.trim())goNext()});
    cont.addEventListener('click',()=>{ if(state.flightNumber.trim()) goNext(); });
  }

  // Q3 — date
  if(s==='q3'){
    const inp=document.getElementById('inp-date');
    const cont=document.getElementById('btn-cont3');
    inp.addEventListener('input',()=>{
      state.flightDate=inp.value;
      cont.disabled=!state.flightDate;
    });
    cont.addEventListener('click',()=>{ if(state.flightDate) goNext(); });
  }

  // Q4 — route
  if(s==='q4'){
    const inpF=document.getElementById('inp-from');
    const inpT=document.getElementById('inp-to');
    const cont=document.getElementById('btn-cont4');
    inpF.focus();
    function syncRoute(){
      state.from=inpF.value;
      state.to=inpT.value;
      cont.disabled=!state.from.trim()||!state.to.trim();
    }
    inpF.addEventListener('input',syncRoute);
    inpT.addEventListener('input',syncRoute);
    cont.addEventListener('click',()=>{ if(state.from.trim()&&state.to.trim()) goNext(); });
  }

  // Results
  if(s==='results'){
    document.getElementById('btn-reset')?.addEventListener('click',reset);
    document.getElementById('btn-claim')?.addEventListener('click',handleClaimLetter);

    // Expandable sections
    document.querySelectorAll('[data-exp]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const id=btn.dataset.exp;
        const body=document.getElementById(`body-${id}`);
        const chev=document.getElementById(`chev-${id}`);
        body.classList.toggle('open');
        chev.classList.toggle('open');
      });
    });

    // Copy script
    document.getElementById('btn-copy')?.addEventListener('click',()=>{
      const txt=document.getElementById('desk-txt').innerText.replace(/Copy$/,'').trim();
      navigator.clipboard.writeText(txt).then(()=>{
        const btn=document.getElementById('btn-copy');
        if(btn){btn.textContent='✓ Copied';setTimeout(()=>{btn.textContent='Copy'},2000);}
      });
    });
  }
}

// Boot
render();
</script>
</body>
</html>
